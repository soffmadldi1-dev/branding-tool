function useIsMobile() {
  const [mobile, setMobile] = useState(window.innerWidth < 768);
  useEffect(() => {
    const h = () => setMobile(window.innerWidth < 768);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);
  return mobile;
}

function setIn(obj, path, val) {
  const keys = path.split(".");
  const next = {...obj};
  let cur = next;
  for (let i = 0; i < keys.length - 1; i++) { cur[keys[i]] = {...cur[keys[i]]}; cur = cur[keys[i]]; }
  cur[keys[keys.length-1]] = val;
  return next;
}

function jobLabel(d) {
  if(d.jobCategory==="custom") return d.jobCustom || "관광 분야 (직무 미입력)";
  var j = JOBS.find(function(x){return x.id===d.jobCategory;});
  return j ? j.label : "관광 분야 (미선택)";
}
function exFor(d) { return EX[d.jobCategory] || EX.custom; }

const IS = {width:"100%",border:"1px solid #E5E5EA",borderRadius:9,padding:"10px 12px",fontSize:13.5,color:"#1D1D1F",background:"#fff",lineHeight:1.6};
function TI({val, set, ph}) { return <input type="text" value={val} onChange={e=>set(e.target.value)} placeholder={ph} style={IS}/>; }
function TA({val, set, ph, rows=3}) { return <textarea value={val} onChange={e=>set(e.target.value)} placeholder={ph} rows={rows} style={IS}/>; }
function Grid2({m, children}) { return <div style={{display:"grid",gridTemplateColumns:m?"1fr":"1fr 1fr",gap:12}}>{children}</div>; }

function Guide({why, good, bad}) {
  const [open, setOpen] = useState(false);
  return (
    <div style={{background:C.canvas,border:"1px solid #E5E5EA",borderRadius:10,marginBottom:20,overflow:"hidden"}}>
      <button onClick={()=>setOpen(v=>!v)} style={{width:"100%",border:"none",background:"transparent",padding:"11px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",textAlign:"left"}}>
        <div style={{display:"flex",alignItems:"center",gap:7}}>
          <span style={{fontSize:14}}>💡</span>
          <span style={{fontWeight:700,fontSize:11.5,color:C.ink}}>이렇게 쓰면 좋아요</span>
        </div>
        <span style={{color:C.faint,fontSize:13,transform:open?"rotate(180deg)":"none",transition:"transform .2s"}}>▾</span>
      </button>
      {open && (
        <div style={{padding:"0 14px 14px",borderTop:"1px solid "+C.borderSoft}}>
          {why && <p style={{color:C.muted,fontSize:12,lineHeight:1.65,margin:"10px 0 "+(good||bad?"10px":"0")}}>{why}</p>}
          {good && (
            <div style={{marginBottom:bad?8:0}}>
              <div style={{color:C.good,fontWeight:700,fontSize:11,marginBottom:4}}>✅ 좋은 예</div>
              <p style={{color:C.ink,background:C.goodBg,fontSize:12,lineHeight:1.65,margin:0,padding:"7px 10px",borderRadius:6}}>{good}</p>
            </div>
          )}
          {bad && (
            <div>
              <div style={{color:C.warn,fontWeight:700,fontSize:11,marginBottom:4}}>✕ 이런 표현은 피하세요</div>
              <p style={{color:C.ink,background:C.warnBg,fontSize:12,lineHeight:1.65,margin:0,padding:"7px 10px",borderRadius:6}}>{bad}</p>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function StrengthChips({selected, toggle}) {
  return (
    <div style={{display:"flex",flexDirection:"column",gap:11}}>
      {STRENGTH_GROUPS.map(function(grp){
        return (
          <div key={grp.g}>
            <div style={{fontSize:10.5,fontWeight:700,color:C.faint,marginBottom:6,letterSpacing:"0.02em"}}>{grp.g}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
              {grp.items.map(function(s){
                var on = selected.indexOf(s)>=0;
                return (
                  <button key={s} onClick={function(){toggle(s);}}
                    style={{border:"1px solid "+(on?C.accent:C.border),background:on?C.accentBg:"#fff",color:on?C.accent:C.muted,
                      borderRadius:20,padding:"6px 13px",fontSize:12.5,fontWeight:on?700:500,cursor:"pointer"}}>
                    {on?"✓ ":""}{s}
                  </button>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function PickChips({options, value, set}) {
  return (
    <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
      {options.map(function(o){
        var on = value===o;
        return (
          <button key={o} onClick={function(){set(on?"":o);}}
            style={{border:"1px solid "+(on?C.ink:C.border),background:on?C.ink:"#fff",color:on?"#fff":C.ink,
              borderRadius:20,padding:"7px 14px",fontSize:12.5,fontWeight:on?700:500,cursor:"pointer"}}>
            {o}
          </button>
        );
      })}
    </div>
  );
}

function S3({d,u,m}) {
  var ex = exFor(d);
  function toggleStr(s){
    var cur = d.expStrengths || [];
    if(cur.indexOf(s)>=0) u("expStrengths", cur.filter(function(x){return x!==s;}));
    else u("expStrengths", cur.concat([s]));
  }
  return (
    <>
      <SH eyebrow="STEP 03 · 경험 발굴" title="내 경험 하나를 꺼내봅니다" sub="고르고 → 채우기만 하면 됩니다. 한 번에 다 쓰려 하지 말고, 아래 질문에 하나씩 답하면 AI가 자소서 구조(STAR)로 정리해줍니다."/>
      <div style={{background:C.goodBg,border:"1px solid #BFE3CD",borderRadius:10,padding:"11px 14px",marginBottom:20,fontSize:12.5,color:C.good,lineHeight:1.65}}>
        🙆 <strong>거창한 경험이 아니어도 됩니다.</strong> <strong>나의 강점을 가장 잘 보여줄 수 있는 에피소드 하나</strong>를 떠올려 보세요. 작은 일이라도 '내가 무언가를 바꾼 경험'이면 충분합니다.
      </div>

      <F label="① 어떤 종류의 경험인가요?" req hint="먼저 골라주세요. 그래야 떠올리기 쉬워집니다">
        <PickChips options={EXP_TYPES} value={d.expType} set={v=>u("expType",v)}/>
      </F>

      <F label="② 그 경험을 한 줄로 적으면?" req hint="나의 강점을 잘 살릴 수 있는 에피소드 하나. 제목 붙이듯 가볍게">
        <TI val={d.expTitle} set={v=>u("expTitle",v)} ph={ex.expTitle}/>
      </F>
      <F label="기간" hint="대략이면 됩니다">
        <TI val={d.expPeriod} set={v=>u("expPeriod",v)} ph="예: 2024년 여름 3개월"/>
      </F>

      <F label="③ 담당한 직무·업무는 무엇이었나요?" hint="맥락: '무슨 일을 맡았는지'부터 정해야 그 다음이 술술 나옵니다. 직책 말고 '한 일'을 적으세요">
        <TI val={d.expJob} set={v=>u("expJob",v)} ph={ex.job}/>
      </F>
      <F label="④ 그 안에서 내 역할은?" hint="맥락: 혼자 했는지, 이끌었는지, 도왔는지에 따라 어필 포인트가 달라집니다">
        <PickChips options={EXP_ROLES} value={d.expRole} set={v=>u("expRole",v)}/>
      </F>

      <F label="⑤ 그 일을 하게 된 배경·상황은요?" hint="맥락: 왜 묻냐면 — 어떤 문제·필요가 있었는지가 있어야, 내 행동이 '의미 있는 일'로 보입니다">
        <TA val={d.expSituation} set={v=>u("expSituation",v)} ph={ex.situation} rows={3}/>
      </F>

      <F label="⑥ 그래서 구체적으로 무엇을, 어떻게 했나요?" req hint="맥락: 위에서 맡은 일을 '실제로 어떤 행동으로' 풀었는지. ③④에서 적은 걸 행동으로 풀어쓴다고 생각하세요. '~했습니다'로 편하게">
        <TA val={d.expAction} set={v=>u("expAction",v)} ph={ex.action} rows={4}/>
      </F>

      <F label="⑦ 비포 → 애프터, 달라진 점이 있나요?" req hint="맥락: 내가 투입되기 전과 후, 나의 생각·역할·역량으로 무엇이 달라졌나요? (예: 전에는 ~했는데, 내가 ~해서 ~로 바뀜)">

        <TI val={d.expNumbers} set={v=>u("expNumbers",v)} ph={ex.numbers}/>
      </F>

      <F label="⑨ 이 경험에서 드러난 나의 강점은?" hint="해당되는 것을 눌러주세요 (여러 개 가능). 카테고리별로 골라보면 쉽습니다">

        </F>

      </div>
    </>
  );
}

        <TA val={d.differentiator} set={v=>u("differentiator",v)} ph={ex.diff} rows={3}/>
      </F>
      <F label="③ 일할 때 내가 중요하게 생각하는 것" hint="거창한 가치관 아니어도 됩니다. 일할 때 나만의 작은 원칙">
        <TA val={d.workValue} set={v=>u("workValue",v)} ph={ex.value} rows={2}/>
      </F>
      <F label="④ 입사하면 해보고 싶은 일" hint="'3~5년 비전'이 막막하면, 그냥 '들어가서 가장 먼저 잘하고 싶은 것'부터 적으세요">
        <TA val={d.aspiration} set={v=>u("aspiration",v)} ph={ex.aspire} rows={2}/>
      </F>
    </>
  );
}

function fmtProfile(d) {
  var L = [];
  L.push("■ 기본 정보");
  L.push("- 이름: " + (d.name||"(미입력)"));
  L.push("- 지원 분야: 관광산업 / " + jobLabel(d) + (d.role?(" ("+d.role+")"):""));
  if(d.oneWord) L.push("- 나를 한 단어로: " + d.oneWord);
  L.push("");
  L.push("■ 스펙 · 강점");
  if(d.education) L.push("- 학력: " + d.education + (d.major?(" / "+d.major):"") + (d.gradYear?(" / "+d.gradYear):""));
  if(d.gpa) L.push("- 학점: " + d.gpa);
  if(d.majorKeywords) L.push("- 전공·관심 키워드: " + d.majorKeywords);
  if(d.certifications) L.push("- 자격증/수상/어학: " + d.certifications);
  if(d.tools) L.push("- 사용 가능 툴: " + d.tools);
  if(d.appealPoint) L.push("- 나만의 어필 포인트: " + d.appealPoint);
  if(d.languages) L.push("- 외국어: " + d.languages);
  L.push("");
  L.push("■ 핵심 경험 (STAR)");
  if(d.expType) L.push("- 경험 종류: " + d.expType);
  if(d.expTitle) L.push("- 경험 요약: " + d.expTitle + (d.expPeriod?(" ("+d.expPeriod+")"):""));
  if(d.expJob) L.push("- 담당 직무/업무: " + d.expJob);
  if(d.expRole) L.push("- 담당 역할: " + d.expRole);
  if(d.expSituation) L.push("- [S] 상황/배경: " + d.expSituation);
  if(d.expAction) L.push("- [A] 행동(무엇을/어떻게): " + d.expAction);
  if(d.expResult) L.push("- [R] 결과(비포→애프터): " + d.expResult);
  if(d.expNumbers) L.push("- 정량 성과/숫자: " + d.expNumbers);
  if(d.expStrengths && d.expStrengths.length) L.push("- 드러난 강점: " + d.expStrengths.join(", "));
  L.push("");
  L.push("■ 가치관 · 지원 동기");
  if(d.motivation) L.push("- 지원 동기: " + d.motivation);
  if(d.differentiator) L.push("- 차별화 포인트: " + d.differentiator);
  if(d.workValue) L.push("- 일하는 원칙: " + d.workValue);
  if(d.aspiration) L.push("- 입사 후 목표: " + d.aspiration);
  return L.join("\n");
}

function buildPrompts(d) {
  var P = fmtProfile(d);
  var name = d.name || "지원자";
  var job = jobLabel(d) + (d.role?(" "+d.role):"");

  var p1 = "# 역할\n"
    + "당신은 관광산업 채용 자기소개서를 14년간 첨삭하고, 호텔·항공·여행·MICE·공기업 서류 심사위원으로 수백 건을 평가해 온 전문가입니다. 평범한 지원자를 '뽑고 싶은 한 명'으로 바꾸는 것이 당신의 일입니다.\n\n"
    + "# 목표\n"
    + "아래 [프로필]을 바탕으로, '" + job + "' 지원용 자기소개서를 '남들과 차별화된, 이 사람만 쓸 수 있는 글'로 작성하세요.\n\n"
    + "[프로필]\n" + P + "\n\n"
    + "# 작성 절차 (반드시 이 순서대로 진행)\n"
    + "STEP 1. 차별화 포인트 도출: [프로필]을 분석해, 이 지원자만 가진 '결정적 강점(unfair advantage)' 1가지를 한 문장으로 정의하세요. 흔한 강점(성실/책임감) 말고, 경험·숫자·조합에서 나오는 고유한 것이어야 합니다. → 이 문장을 자소서 전체를 관통하는 축으로 삼습니다.\n"
    + "STEP 2. 초안 작성: 아래 [형식]과 [규칙]에 맞춰 4개 항목을 작성합니다.\n"
    + "STEP 3. 자가 검증 후 개선: 작성한 초안을 아래 [검증 체크리스트]로 스스로 채점하고, 걸리는 부분을 1회 고쳐 '최종본'으로 다시 제시하세요.\n\n"
    + "# 형식\n"
    + "① 지원 동기 (400~500자) ② 핵심 경험·역량 (500~600자, STAR 흐름) ③ 직무 적합성·나의 강점 (400~500자) ④ 입사 후 포부 (300~400자)\n\n"
    + "# 규칙\n"
    + "1. STEP 1에서 정의한 차별화 포인트가 4개 항목에 일관되게 흐르게 할 것.\n"
    + "2. 각 항목 맨 앞에, 그 항목 내용 전체를 한눈에 아우르는 '소제목(헤드라인)'을 붙일 것. 소제목은 15자 내외로 임팩트 있게, 채용담당자가 제목만 봐도 끌리도록(예: \"줄 서는 프론트를 5분 만에 비운 사람\"). 진부한 제목(예: \"성실한 지원자\") 금지.\n"
    + "3. 모든 항목은 두괄식. 소제목 다음 첫 문장에서 결론·핵심을 먼저 말할 것. 인사말·미사여구로 시작 금지.\n"
    + "4. [프로필]의 실제 경험·숫자·강점 키워드를 항목마다 최소 1개 구체적으로 인용. 프로필에 없는 사실은 절대 지어내지 말 것(없으면 '추가 확인 필요'로 표시).\n"
    + "5. 금지 표현: '성실한', '열정적인', '책임감 있는', '소통 능력', '최선을 다하겠습니다', '~한 인재가 되겠습니다', '어릴 적부터', '귀사'. → 추상어 대신 장면·행동·숫자로 보여줄 것.\n"
    + "6. 관광·서비스 직무 특성상 '고객/손님 경험을 어떻게 바꿨는가' 관점을 자연스럽게 녹일 것.\n"
    + "7. 문장은 짧고 능동태로. 한 문장에 한 메시지.\n\n"
    + "# 검증 체크리스트 (STEP 3에서 사용)\n"
    + "- [ ] 각 항목에 내용을 아우르는 매력적인 소제목이 달렸는가?\n"
    + "- [ ] 이 글을 다른 지원자가 그대로 써도 말이 되는가? → 되면 차별화 실패. 더 구체화.\n"
    + "- [ ] 각 항목 첫 문장만 읽어도 핵심이 전달되는가?\n"
    + "- [ ] 금지 표현이 하나도 없는가?\n"
    + "- [ ] 구체적 숫자·장면이 항목마다 있는가?\n\n"
    + "# 출력\n"
    + "(1) STEP 1 차별화 포인트 한 문장 → (2) 4개 항목 최종본(각 항목은 [소제목] 줄로 시작, 항목 끝에 [핵심 키워드: ○○, ○○]) → (3) '면접관이 이 자소서를 보고 파고들 질문 3개'와 간단한 답변 방향.";

  var p2 = "# 역할\n"
    + "당신은 관광산업 취업 포트폴리오를 설계해 합격시켜 온 디렉터입니다.\n\n"
    + "# 목표\n"
    + "'" + job + "' 합격을 위한 포트폴리오/제출서류를, 이 지원자의 [프로필]에 맞춰 '바로 만들 수 있게' 설계하세요. 일반론이 아니라, 이 사람 전용 설계여야 합니다.\n\n"
    + "[프로필]\n" + P + "\n\n"
    + "# 작성 규칙\n"
    + "1. 먼저 이 지원자가 포트폴리오로 증명해야 할 '핵심 메시지 1줄'을 정의하세요. 모든 섹션은 이 메시지를 뒷받침해야 합니다.\n"
    + "2. PDF 또는 Notion 기준 7~10개 섹션을 표로: 섹션명 / 목적 / 이 지원자가 넣을 구체적 내용(프로필에서 가져와 적시) / 추천 형식 / 분량.\n"
    + "3. 표지(자기소개)와 마지막(연락처·입사 후 포부) 반드시 포함.\n"
    + "4. [프로필]의 핵심 경험을 어느 섹션에 어떤 제목·구성으로 배치할지 구체적으로 안내(예시 문구까지).\n"
    + "5. 관광 직무 특성상 '서비스 마인드·현장 경험'을 보여줄 섹션을 ★로 강조하고, 사진/후기/수치 등 무엇으로 증명할지 제안.\n"
    + "6. 경험이 적은 신입이라면 '경험을 어떻게 의미 있게 보이게 할지' 보완 전략을 별도로 제시.\n"
    + "7. 마지막에 '이 포트폴리오로 받을 예상 면접 질문 5개'와 각 질문에 어느 섹션으로 답할지 매핑.";

  var p3 = "# 역할\n"
    + "당신은 한 사람의 본질을 한 문장으로 압축하는 퍼스널 브랜딩 카피라이터입니다.\n\n"
    + "# 목표\n"
    + "아래 [프로필]을 바탕으로 " + name + "를 한 줄로 표현하는 소개 문구를 만드세요.\n\n"
    + "[프로필]\n" + P + "\n\n"
    + "# 작성 규칙\n"
    + "1. 먼저 [프로필]에서 이 사람을 규정하는 '핵심 키워드 3개'를 뽑고, 왜 그 3개인지 한 줄씩 설명하세요.\n"
    + "2. 그 키워드를 기반으로 3가지 톤(따뜻한 / 프로페셔널 / 개성 있는) × 3가지 길이(20자 / 40자 / 70자) = 9개를 표로 제시.\n"
    + "3. 모든 문구에 [프로필]의 실제 경험 또는 강점 키워드를 1개 이상 녹일 것. '성실한·열정적인' 같은 추상어 금지.\n"
    + "4. 9개 중 가장 추천하는 1개를 고르고 이유를 3문장으로.\n"
    + "5. (활용 가이드) 자소서 첫 문장용 / 면접 1분 자기소개 도입용 / 이력서 헤드라인용으로 각각 어떤 버전을 쓰면 좋은지 추천.";

  return [
    {id:"p1", ico:"📄", title:"자기소개서 4대 항목 초안", usage:"차별화 포인트 도출 → 4개 항목 작성 → AI 자가검증·개선까지 한 번에. 가장 먼저 쓰세요.", tip:"받은 뒤 채용 공고를 붙여넣고 \"이 공고 인재상에 맞게 다시 써줘\"라고 하면 정확도가 확 올라갑니다.", content:p1},
    {id:"p2", ico:"📁", title:"포트폴리오 · 제출서류 구조 설계", usage:"내 경험에 맞춘 포트폴리오 목차 + 섹션별 들어갈 내용 + 예상 면접 질문 매핑까지 받습니다.", tip:"자신 없는 섹션은 \"○○ 섹션을 실제 문구까지 써줘\"로 한 번 더 파고드세요.", content:p2},
    {id:"p3", ico:"✨", title:"나를 한 줄로 표현하는 소개 문구", usage:"핵심 키워드 도출 → 톤·길이별 9개 → 추천 버전·활용처까지. 자소서 첫 문장·면접·이력서에 바로 씁니다.", tip:"9개 중 지인·멘토에게 보여주고 '너답다'는 반응을 받은 것을 고르세요.", content:p3},
  ];
}

function completion(d) {
  var checks = [
    !!d.name, !!d.jobCategory, !!d.appealPoint,
    !!d.expTitle, !!d.expAction, !!d.expResult,
    !!d.motivation, !!d.differentiator,
  ];
  var filled = checks.filter(Boolean).length;
  return Math.round(filled/checks.length*100);
}

function PCard({num, ico, title, usage, tip, content, done, onCopy}) {

        <div style={{flex:1,minWidth:0}}>
          <div style={{color:C.muted,fontWeight:700,fontSize:10,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:3}}>프롬프트 {num}</div>

function SummaryRow({label, val, ph}) {

      <div style={{flex:1,padding:"12px 14px",fontSize:12.5,lineHeight:1.6,color:has?C.ink:C.faint}}>{has?val:ph}</div>

      <SummaryRow label="S 상황" val={d.expSituation} ph="그 일을 하게 된 배경"/>
      <SummaryRow label="A 행동" val={d.expAction} ph="구체적으로 한 일"/>
      <SummaryRow label="R 결과" val={d.expResult} ph="비포→애프터 달라진 점"/>
      <SummaryRow label="성과 숫자" val={d.expNumbers} ph="유의미한 성과·숫자 (선택)"/>
      <SummaryRow label="지원 동기" val={d.motivation} ph="STEP 4에서 입력"/>
      <SummaryRow label="차별화" val={d.differentiator} ph="나를 구분하는 한 가지"/>
      <div style={{background:C.kakao,padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:9}}>
          <span style={{fontSize:22}}>💬</span>
          <div>
            <div style={{fontWeight:800,fontSize:13,color:"#1A1A1A"}}>요셉쌤 AI문서연구소</div>
            <div style={{fontSize:11.5,color:"#6B5B00"}}>이력서·자소서·퍼스널브랜딩 질문 환영</div>
          </div>
        </div>
        <div style={{fontSize:11.5,fontWeight:700,color:"#1A1A1A"}}>open.kakao.com/me/yosepAI</div>
      </div>
    </div>
  );
}

function S5({d, copied, onCopy}) {
  var prompts = useMemo(function(){return buildPrompts(d);},[d]);
  var pct = useMemo(function(){return completion(d);},[d]);
  return (
    <>
      <SH eyebrow="STEP 05 · 완성" title="나만의 프롬프트가 완성됐습니다" sub="입력한 내용이 3가지 프롬프트로 자동 정리됐습니다. 복사 → Claude 새 대화창에 붙여넣기 → 결과 확인. 순서대로 쓰는 걸 추천합니다."/>
      <div style={{background:pct>=60?C.goodBg:C.warnBg,border:"1px solid "+(pct>=60?C.good:C.warn),borderRadius:10,padding:"11px 14px",marginBottom:22,display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:20,flexShrink:0}}>{pct>=60?"✅":"📝"}</span>
        <div style={{fontSize:12.5,color:C.ink,lineHeight:1.5}}>
          <strong>입력 완성도 {pct}%</strong> — {pct>=60?"충분합니다. 프롬프트를 바로 사용하세요.":"앞 단계를 조금 더 채우면 결과가 좋아집니다."}
        </div>
      </div>
      {prompts.map(function(p,i){
        return <PCard key={p.id} num={i+1} ico={p.ico} title={p.title} usage={p.usage} tip={p.tip} content={p.content} done={copied===p.id} onCopy={function(){onCopy(p.content,p.id);}}/>;
      })}
      <div style={{background:"#F0F7FF",border:"1px solid #C3D8F5",borderRadius:14,padding:18,marginTop:8,marginBottom:24}}>
        <div style={{fontWeight:800,fontSize:14,color:C.ink,marginBottom:12,display:"flex",alignItems:"center",gap:7}}>🗂️ 프롬프트를 잘 쓰는 3가지 방법</div>
        {[
          "복사 → Claude 새 대화창에 붙여넣기만 하면 됩니다. 결과를 받은 뒤 \"OO 회사 공고에 맞게 바꿔줘\", \"400자로 줄여줘\"로 계속 다듬으세요.",
          "결과가 마음에 안 들면 앞 단계로 돌아가 경험을 더 구체적으로 채워보세요. 입력이 구체적일수록 결과가 날카로워집니다.",
          "자소서 초안은 그대로 제출하지 마세요. AI 초안은 뼈대일 뿐, 내 실제 경험과 말투를 얹어야 진짜 '내 자소서'가 됩니다.",
        ].map(function(t,i){
          return (
            <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:i<2?11:0}}>
              <div style={{width:23,height:23,borderRadius:"50%",background:C.accent,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,flexShrink:0,marginTop:1}}>{i+1}</div>
              <div style={{fontSize:13,color:C.ink,lineHeight:1.7}}>{t}</div>
            </div>
          );
        })}
      </div>
      <div style={{marginBottom:14}}>
        <div style={{color:C.accent,fontWeight:700,fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:6}}>결과물 · 내 자산 정리</div>
        <h2 style={{fontWeight:800,fontSize:20,color:C.ink,margin:"0 0 6px"}}>오늘 만든 나만의 경험 자산</h2>
        <p style={{color:C.muted,fontSize:13,margin:0,lineHeight:1.6}}>아래 표를 <strong>캡처(화면 촬영)</strong>해 두면 다른 회사 지원할 때도 그대로 재활용할 수 있어요.</p>
      </div>
      <Summary d={d}/>
      <div style={{background:C.kakao,borderRadius:12,padding:"15px",marginTop:14,textAlign:"center"}}>
        <div style={{fontWeight:800,fontSize:14,color:"#1A1A1A",marginBottom:3}}>📸 이 화면을 캡처하세요!</div>
        <div style={{fontSize:12,color:"#6B5B00"}}>위 정리표를 캡처해두면 두고두고 쓸 수 있습니다</div>
      </div>
      <div style={{marginTop:22,paddingTop:18,borderTop:"1px solid "+C.border,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <span style={{fontSize:16}}>💬</span>
        <p style={{margin:0,flex:1,fontSize:13,color:C.muted,lineHeight:1.6}}>
          이력서·자기소개서·퍼스널브랜딩 관련해서 더 궁금한 게 있으면{" "}
          <a href={KAKAO} target="_blank" style={{color:C.accent,fontWeight:700,textDecoration:"none"}}>요셉쌤 AI문서연구소 오픈카카오 →</a>
          {" "}로 편하게 연락주세요.
        </p>
      </div>
    </>
  );
}

function App() {
  var _s = useState(1); var step = _s[0]; var setStep = _s[1];
  var _d = useState(INIT); var data = _d[0]; var setData = _d[1];
  var _c = useState(null); var copied = _c[0]; var setCopied = _c[1];
  var isMobile = useIsMobile();

  var upd = useCallback(function(path, val){ setData(function(p){return setIn(p,path,val);}); },[]);
  useEffect(function(){ window.scrollTo({top:0,behavior:"smooth"}); },[step]);

  function copyPrompt(text,id){ navigator.clipboard.writeText(text); setCopied(id); setTimeout(function(){setCopied(null);},2200); }

  var pct = step/STEPS.length*100;

  var Sidebar = (
    <aside style={{position:"sticky",top:70,height:"fit-content",width:208,flexShrink:0}}>
      <div style={{color:C.muted,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>진행 단계 {step}/{STEPS.length}</div>
      <ol style={{listStyle:"none",margin:0,padding:0}}>
        {STEPS.map(function(s){
          var active=s.id===step, done=s.id<step;
          return (
            <li key={s.id} style={{marginBottom:3}}>
              <button onClick={function(){setStep(s.id);}}
                style={{width:"100%",textAlign:"left",border:"none",borderRadius:9,padding:"9px 11px",display:"flex",alignItems:"flex-start",gap:9,cursor:"pointer",
                  background:active?C.ink:"transparent",color:active?"#fff":done?C.ink:C.muted}}>
                <div style={{width:22,height:22,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,flexShrink:0,marginTop:1,
                  background:active?"#fff":done?C.accent:C.borderSoft,color:active?C.ink:done?"#fff":C.muted}}>{done?"✓":s.id}</div>
                <div>
                  <div style={{fontWeight:600,fontSize:12.5,lineHeight:1.3}}>{s.label}</div>
                  <div style={{fontSize:10.5,opacity:0.6,marginTop:2,lineHeight:1.3}}>{s.sub}</div>
                </div>
              </button>
            </li>
          );
        })}
      </ol>
    </aside>
  );

  var MobileStepBar = (
    <div style={{background:C.panel,borderBottom:"1px solid "+C.border,padding:"10px 0 0"}}>
      <div className="step-scroll" style={{padding:"0 16px 10px",display:"flex",gap:7}}>
        {STEPS.map(function(s){
          var active=s.id===step, done=s.id<step;
          return (
            <button key={s.id} onClick={function(){setStep(s.id);}}
              style={{flexShrink:0,display:"flex",alignItems:"center",gap:5,border:"none",borderRadius:20,padding:"6px 13px",cursor:"pointer",
                background:active?C.ink:done?C.accentBg:C.borderSoft,color:active?"#fff":done?C.accent:C.muted,
                fontSize:11.5,fontWeight:700,whiteSpace:"nowrap",boxShadow:active?"0 2px 8px rgba(0,0,0,0.15)":"none"}}>
              <span style={{width:18,height:18,borderRadius:"50%",background:active?"rgba(255,255,255,0.2)":done?C.accent:"rgba(0,0,0,0.08)",color:active?"#fff":done?"#fff":C.muted,
                display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:900,flexShrink:0}}>{done?"✓":s.id}</span>
              {s.label}
            </button>
          );
        })}
      </div>
      <div style={{height:3,background:C.borderSoft}}><div style={{width:pct+"%",height:"100%",background:C.accent,transition:"width 0.4s ease"}}/></div>
    </div>
  );

  return (
    <div style={{background:C.canvas,minHeight:"100vh",color:C.ink}}>
      <header style={{borderBottom:"1px solid "+C.border,background:C.panel,position:"sticky",top:0,zIndex:50}}>
        <div style={{maxWidth:1100,margin:"0 auto",padding:isMobile?"11px 16px":"13px 22px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{background:C.ink,width:34,height:34,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>✨</div>
            <div>
              <div style={{fontWeight:800,fontSize:isMobile?13:14.5,letterSpacing:"-0.02em",lineHeight:1.2}}>관광분야 자기소개서 프롬프트 생성기</div>
              {!isMobile && <div style={{color:C.muted,fontSize:11,marginTop:1}}>퍼스널브랜딩으로 나만의 자소서 프롬프트 완성하기</div>}
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{color:C.accent,fontWeight:800,fontSize:13}}>{step}</span>
            <span style={{color:C.faint,fontSize:12}}>/ {STEPS.length}</span>
            <span style={{color:C.muted,fontSize:11,marginLeft:4,display:isMobile?"none":"inline"}}>{STEPS[step-1].label}</span>
          </div>
        </div>
        {!isMobile && <div style={{height:3,background:C.borderSoft}}><div style={{width:pct+"%",height:"100%",background:C.accent,transition:"width 0.4s ease"}}/></div>}
      </header>

      {isMobile && MobileStepBar}

      <div style={{maxWidth:1100,margin:"0 auto",padding:isMobile?"16px 12px":"26px 22px",display:isMobile?"block":"flex",gap:24,alignItems:"flex-start"}}>
        {!isMobile && Sidebar}
        <main style={{flex:1,minWidth:0}}>
          <div style={{background:C.panel,border:"1px solid "+C.border,borderRadius:isMobile?14:18,padding:isMobile?"20px 16px":34}}>
            {step===1 && <S1 d={data} u={upd} m={isMobile}/>}
            {step===2 && <S2 d={data} u={upd} m={isMobile}/>}
            {step===3 && <S3 d={data} u={upd} m={isMobile}/>}
            {step===4 && <S4 d={data} u={upd} m={isMobile}/>}
            {step===5 && <S5 d={data} copied={copied} onCopy={copyPrompt}/>}
            <div style={{borderTop:"1px solid "+C.border,marginTop:28,paddingTop:16,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <button onClick={function(){setStep(function(s){return Math.max(1,s-1);});}} disabled={step===1}
                style={{border:"1px solid "+C.border,background:"transparent",color:step===1?C.faint:C.ink,borderRadius:8,padding:isMobile?"10px 16px":"9px 18px",fontSize:13,fontWeight:600,cursor:step===1?"not-allowed":"pointer"}}>← 이전</button>
              <span style={{color:C.faint,fontSize:12}}>{step} / {STEPS.length}</span>
              {step<STEPS.length
                ? <button onClick={function(){setStep(function(s){return Math.min(STEPS.length,s+1);});}}
                    style={{background:C.ink,color:"#fff",border:"none",borderRadius:8,padding:isMobile?"10px 18px":"9px 20px",fontSize:13,fontWeight:700,cursor:"pointer"}}>다음 →</button>
                : <button onClick={function(){setStep(1);}}
                    style={{border:"1px solid "+C.border,background:"transparent",color:C.ink,borderRadius:8,padding:isMobile?"10px 16px":"9px 18px",fontSize:13,fontWeight:600,cursor:"pointer"}}>처음으로</button>}
            </div>
          </div>
          <p style={{color:C.faint,fontSize:11,marginTop:10,padding:"0 4px",lineHeight:1.6}}>
            💡 입력 내용은 브라우저를 닫으면 사라집니다. 마지막 단계에서 정리표를 캡처하거나 프롬프트를 복사해 저장하세요.
          </p>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
