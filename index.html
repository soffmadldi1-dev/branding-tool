<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>퍼스널 브랜딩 프로필 빌더</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;padding:0;background:#FAFAF8;font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,sans-serif}
input,textarea,button{font-family:inherit}
textarea{resize:vertical}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#AEAEB2;border-radius:3px}
input:focus,textarea:focus{outline:none;border-color:#1D1D1F !important}
/* Mobile step scroller — hide scrollbar but keep scroll */
.step-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.step-scroll::-webkit-scrollbar{display:none}
.step-scroll{-ms-overflow-style:none;scrollbar-width:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useMemo, useCallback, useEffect } = React;

const C = {
  canvas:"#FAFAF8", panel:"#FFFFFF", ink:"#1D1D1F",
  muted:"#6E6E73", faint:"#AEAEB2",
  accent:"#0066CC", accentBg:"#E8F0FB",
  border:"#E5E5EA", borderSoft:"#F0F0F2",
  good:"#0A7A3B", goodBg:"#E8F5EE",
  warn:"#B45309", warnBg:"#FEF3E7",
};

/* ── 7단계 구성 (경험 #3 제거) ───────────── */
const STEPS = [
  {id:1, label:"기본 정보",    sub:"지원 분야 & 한 단어 정체성",  ico:"🎯"},
  {id:2, label:"학력·자격·툴", sub:"객관 스펙 + AI 툴 현황",      ico:"📖"},
  {id:3, label:"핵심 경험 #1", sub:"STAR 프레임 · 필수",          ico:"💼"},
  {id:4, label:"핵심 경험 #2", sub:"STAR 프레임 · 선택",          ico:"💼"},
  {id:5, label:"강점 Top 3",   sub:"역량 + 증명 에피소드",         ico:"🏆"},
  {id:6, label:"가치관·차별화", sub:"일하는 방식과 차별점",        ico:"💛"},
  {id:7, label:"프롬프트 생성", sub:"Claude용 4종 프롬프트",       ico:"✨"},
];

function useIsMobile() {
  const [mobile, setMobile] = useState(window.innerWidth < 768);
  useEffect(() => {
    const h = () => setMobile(window.innerWidth < 768);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);
  return mobile;
}

const emptyExp = () => ({
  title:"",period:"",role:"",situation:"",task:"",action:"",
  metricPeople:"",metricCount:"",metricImpact:"",
  resultQuant:"",resultQual:"",skills:""
});

const INIT = {
  name:"",age:"",targetIndustry:"",targetRole:"",oneWord:"",oneWordReason:"",
  education:"",major:"",gradYear:"",majorKeywords:"",gpa:"",
  certifications:"",aiTools:"",otherTools:"",languages:"",
  exp1:emptyExp(), exp2:emptyExp(),
  strength1:{name:"",evidence:""}, strength2:{name:"",evidence:""}, strength3:{name:"",evidence:""},
  workStyle:"",vision:"",differentiator:"",motivation:"",
};

function setIn(obj, path, val) {
  const keys = path.split(".");
  const next = {...obj};
  let cur = next;
  for (let i = 0; i < keys.length - 1; i++) {
    cur[keys[i]] = {...cur[keys[i]]};
    cur = cur[keys[i]];
  }
  cur[keys[keys.length-1]] = val;
  return next;
}

/* ── tiny UI components ─────────────────── */
function SH({eyebrow, title, sub, optional}) {
  return (
    <div style={{marginBottom:24}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
        <div style={{color:C.accent,fontWeight:700,fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase"}}>{eyebrow}</div>
        {optional && <div style={{background:C.accentBg,color:C.accent,fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20}}>선택 항목</div>}
      </div>
      <h1 style={{fontWeight:800,fontSize:"clamp(18px,4vw,26px)",letterSpacing:"-0.025em",color:C.ink,margin:"0 0 6px",lineHeight:1.25}}>{title}</h1>
      <p style={{color:C.muted,fontSize:13,lineHeight:1.65,margin:0}}>{sub}</p>
    </div>
  );
}

function F({label, hint, req, children}) {
  return (
    <div style={{marginBottom:14}}>
      <label style={{display:"block",marginBottom:5}}>
        <span style={{fontWeight:600,color:C.ink,fontSize:13}}>{label}</span>
        {req && <span style={{color:C.accent,marginLeft:3}}>*</span>}
        {hint && <span style={{color:C.muted,fontSize:11,marginLeft:6}}>{hint}</span>}
      </label>
      {children}
    </div>
  );
}

const IS = {width:"100%",border:"1px solid #E5E5EA",borderRadius:8,padding:"9px 12px",fontSize:13,color:"#1D1D1F",background:"#fff",lineHeight:1.6};

function TI({val, set, ph}) {
  return <input type="text" value={val} onChange={e=>set(e.target.value)} placeholder={ph} style={IS}/>;
}
function TA({val, set, ph, rows=3}) {
  return <textarea value={val} onChange={e=>set(e.target.value)} placeholder={ph} rows={rows} style={IS}/>;
}

function Grid2({isMobile, children}) {
  return (
    <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:12}}>
      {children}
    </div>
  );
}

function Guide({why, good, bad}) {
  const [open, setOpen] = useState(false);
  return (
    <div style={{background:C.canvas,border:"1px solid #E5E5EA",borderRadius:10,marginBottom:20,overflow:"hidden"}}>
      <button onClick={()=>setOpen(v=>!v)} style={{
        width:"100%",border:"none",background:"transparent",padding:"11px 14px",
        display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",
        textAlign:"left",
      }}>
        <div style={{display:"flex",alignItems:"center",gap:7}}>
          <span style={{fontSize:14}}>💡</span>
          <span style={{fontWeight:700,fontSize:11,color:C.ink}}>왜 이걸 묻나요?</span>
        </div>
        <span style={{color:C.faint,fontSize:13,transform:open?"rotate(180deg)":"none",transition:"transform .2s"}}>▾</span>
      </button>
      {open && (
        <div style={{padding:"0 14px 14px",borderTop:"1px solid "+C.borderSoft}}>
          {why && <p style={{color:C.muted,fontSize:12,lineHeight:1.65,margin:"10px 0 "+(good||bad?"10px":"0")}}>{why}</p>}
          {good && (
            <div style={{marginBottom:bad?8:0}}>
              <div style={{color:C.good,fontWeight:700,fontSize:11,marginBottom:4}}>✅ 좋은 예</div>
              <p style={{color:C.ink,background:C.goodBg,fontSize:12,lineHeight:1.65,margin:0,padding:"7px 10px",borderRadius:6}}>{good}</p>
            </div>
          )}
          {bad && (
            <div>
              <div style={{color:C.warn,fontWeight:700,fontSize:11,marginBottom:4}}>✕ 피해야 할 예</div>
              <p style={{color:C.ink,background:C.warnBg,fontSize:12,lineHeight:1.65,margin:0,padding:"7px 10px",borderRadius:6}}>{bad}</p>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ── Steps ─────────────────────────────── */
function S1({d,u,m}) {
  return (
    <>
      <SH eyebrow="STEP 01" title="당신은 누구이고, 어디로 가려고 하나요?" sub="브랜딩은 '나를 모르는 사람이 1분 안에 이해할 수 있게 만드는 작업'입니다. 먼저 좌표부터 찍습니다."/>
      <Guide
        why="지원 분야가 막연하면 AI도 막연한 답을 줍니다. '마케팅'이 아니라 '뷰티 브랜드의 퍼포먼스 마케팅'처럼 구체적으로 적을수록 결과물이 날카로워집니다."
        good="산업: 뷰티/화장품 D2C 브랜드  /  직무: 퍼포먼스 마케팅 (메타·구글 광고 운영)"
        bad="산업: 마케팅 / 직무: 마케터 (← 산업과 직무가 뒤섞이고 너무 광범위)"
      />
      <Grid2 isMobile={m}>
        <F label="이름" req><TI val={d.name} set={v=>u("name",v)} ph="홍길동"/></F>
        <F label="나이 (선택)" hint="만 나이 또는 학번"><TI val={d.age} set={v=>u("age",v)} ph="26세 / 99년생"/></F>
        <F label="목표 산업" req hint="구체적으로 한 산업만"><TI val={d.targetIndustry} set={v=>u("targetIndustry",v)} ph="예: 뷰티/화장품 D2C, B2B SaaS, MICE/관광"/></F>
        <F label="목표 직무" req hint="JD에 있는 말로"><TI val={d.targetRole} set={v=>u("targetRole",v)} ph="예: 퍼포먼스 마케터, HRD 컨설턴트, UX 리서처"/></F>
      </Grid2>
      <F label="나를 한 단어로 표현하면?" req hint="형용사+명사 조합 추천"><TI val={d.oneWord} set={v=>u("oneWord",v)} ph="예: 데이터로 말하는 마케터 / 끈질긴 학습자 / 현장형 기획자"/></F>
      <F label="왜 그 단어인가요?" hint="2~3문장. 한 줄 소개의 씨앗이 됩니다.">
        <TA val={d.oneWordReason} set={v=>u("oneWordReason",v)} ph="예: 동아리·인턴 모두에서 데이터로 의사결정을 바꿔낸 경험이 있어, 감보다 숫자로 설득하는 게 편합니다." rows={3}/>
      </F>
    </>
  );
}

function S2({d,u,m}) {
  return (
    <>
      <SH eyebrow="STEP 02" title="객관 스펙 & 무기 리스트" sub="학력은 사실 그대로, 자격증과 툴은 '쓸 수 있는 것'만 적습니다. AI 툴 활용 능력은 2026년 취업 시장의 핵심 차별점입니다."/>
      <Guide
        why="AI 툴은 '쓸 줄 안다'가 아니라 '어떤 결과물을 만들어봤다'까지 적어야 강점이 됩니다."
        good="ChatGPT (블로그 자동화 워크플로우 구축), Claude (이력서 코칭 봇 제작), Notion AI, Figma"
        bad="ChatGPT, GPT, AI 사용 가능 (← 무엇을 만들어봤는지 없음)"
      />
      <Grid2 isMobile={m}>
        <F label="최종 학력"><TI val={d.education} set={v=>u("education",v)} ph="예: 한국대학교 (4년제)"/></F>
        <F label="전공"><TI val={d.major} set={v=>u("major",v)} ph="예: 경영학 전공, 심리학 부전공"/></F>
        <F label="졸업(예정) 연도"><TI val={d.gradYear} set={v=>u("gradYear",v)} ph="예: 2026.02 졸업예정"/></F>
        <F label="학점" hint="4.0 이상일 때만 권장"><TI val={d.gpa} set={v=>u("gpa",v)} ph="예: 4.12 / 4.5"/></F>
      </Grid2>
      <F label="전공 핵심 키워드 (3~5개)">
        <TI val={d.majorKeywords} set={v=>u("majorKeywords",v)} ph="예: 소비자행동론, 마케팅 리서치, SPSS, 통계분석"/>
      </F>
      <F label="자격증 / 수상 / 어학 점수">
        <TA val={d.certifications} set={v=>u("certifications",v)} ph="예: GAIQ 자격증 (2025.03) / 마케팅학회 우수논문상 / TOEIC 920" rows={2}/>
      </F>
      <F label="AI 툴 활용 경험" req hint="툴명 + 어떤 결과물을 만들었는지">
        <TA val={d.aiTools} set={v=>u("aiTools",v)} ph="예: ChatGPT - 블로그 자동화 워크플로우 설계 / Claude - 이력서 첨삭 챗봇 제작" rows={3}/>
      </F>
      <F label="기타 사용 가능한 툴">
        <TI val={d.otherTools} set={v=>u("otherTools",v)} ph="예: Figma, Notion, GA4, Meta Ads Manager, Power BI"/>
      </F>
      <F label="외국어 (선택)">
        <TI val={d.languages} set={v=>u("languages",v)} ph="예: 영어 (업무 회화), 일본어 (JLPT N2)"/>
      </F>
    </>
  );
}

function SE({title, sub, stepLabel, optional, num, exp, path, u, m}) {
  return (
    <>
      <SH eyebrow={stepLabel} title={title} sub={sub} optional={optional}/>
      {optional && (
        <div style={{background:C.accentBg,border:"1px solid #C3D8F5",borderRadius:10,padding:"10px 14px",marginBottom:18,fontSize:12,color:C.accent}}>
          ✋ <strong>입력 안 해도 됩니다.</strong> 첫 번째 경험만 있어도 프롬프트가 생성됩니다. 결이 다른 두 번째 경험이 있으면 자소서 설득력이 높아집니다.
        </div>
      )}
      <Guide
        why="STAR 구조는 면접관·AI 모두가 가장 빨리 이해하는 방식입니다. '열심히 했다'가 아니라 '몇 명·몇 회·몇 %'로 적어야 다른 지원자와 구분됩니다."
        good="6명 팀 / 12주 / 인스타 도달 380% 증가 / 전환율 2.1% → 4.7%"
        bad="많은 사람들과 / 오랜 기간 / 좋은 성과 / 크게 향상 (← 검증 불가)"
      />
      <Grid2 isMobile={m}>
        <F label="경험명" req hint="이력서 한 줄 제목 형식으로"><TI val={exp.title} set={v=>u(path+".title",v)} ph="예: 대학생 마케팅 동아리 회장 / 스타트업 인턴"/></F>
        <F label="기간" req><TI val={exp.period} set={v=>u(path+".period",v)} ph="예: 2024.03 ~ 2024.12 (10개월)"/></F>
      </Grid2>
      <F label="당시 내 역할" req>
        <TI val={exp.role} set={v=>u(path+".role",v)} ph="예: 회장 / 마케팅 인턴 / 프로젝트 PM"/>
      </F>
      <Grid2 isMobile={m}>
        <F label="S — 상황 / 배경" req hint="어떤 환경·문제였나?">
          <TA val={exp.situation} set={v=>u(path+".situation",v)} ph="예: 동아리 인스타 팔로워가 1년째 1,200명에 정체 중이었고, 신규 가입률이 분기당 5% 미만으로 떨어진 상태였습니다." rows={3}/>
        </F>
        <F label="T — 내 과제 / 목표" req hint="무엇을 책임졌나?">
          <TA val={exp.task} set={v=>u(path+".task",v)} ph="예: 6개월 안에 팔로워 3,000명 돌파와 분기 가입률 15% 회복을 목표로, 콘텐츠 전략 재설계를 맡았습니다." rows={3}/>
        </F>
      </Grid2>
      <F label="A — 무엇을, 어떻게 했나?" req hint="구체적 행동 3~5문장. 동사로 시작">
        <TA val={exp.action} set={v=>u(path+".action",v)} ph="예: ① 기존 콘텐츠 100개를 분석해 효율 낮은 4개 카테고리를 정리했습니다. ② 6명 팀을 4파트로 재편하고 주 1회 KPI 리뷰를 도입했습니다. ③ ChatGPT로 주간 아이디어 30개를 생성하는 워크플로우를 만들어 기획 시간을 70% 단축했습니다." rows={4}/>
      </F>
      <div style={{background:C.accentBg,borderLeft:"4px solid "+C.accent,borderRadius:"0 8px 8px 0",padding:"9px 14px",marginBottom:14}}>
        <div style={{color:C.accent,fontWeight:800,fontSize:10,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:3}}>정량 지표 — 가장 중요합니다</div>
        <div style={{color:C.ink,fontSize:12}}>이 세 칸을 비우면 한 줄 소개의 설득력이 절반으로 떨어집니다. 추정치라도 적어주세요.</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:m?"1fr 1fr":"1fr 1fr 1fr",gap:10,marginBottom:4}}>
        <F label="함께한 인원" hint="팀 규모"><TI val={exp.metricPeople} set={v=>u(path+".metricPeople",v)} ph="예: 6명 팀"/></F>
        <F label="처리한 횟수/건수"><TI val={exp.metricCount} set={v=>u(path+".metricCount",v)} ph="예: 콘텐츠 120건"/></F>
        {!m && <F label="향상/절감/증가율"><TI val={exp.metricImpact} set={v=>u(path+".metricImpact",v)} ph="예: 도달 +380%"/></F>}
      </div>
      {m && (
        <F label="향상/절감/증가율">
          <TI val={exp.metricImpact} set={v=>u(path+".metricImpact",v)} ph="예: 도달 +380%"/>
        </F>
      )}
      <Grid2 isMobile={m}>
        <F label="R — 정량 성과" req>
          <TA val={exp.resultQuant} set={v=>u(path+".resultQuant",v)} ph="예: 6개월 만에 팔로워 1,200 → 3,420명 (+185%), 분기 신규 가입률 4.2% → 17.3%" rows={3}/>
        </F>
        <F label="R — 정성 성과 / 영향">
          <TA val={exp.resultQual} set={v=>u(path+".resultQual",v)} ph="예: 동아리 운영 매뉴얼을 처음으로 문서화해 후배 기수가 KPI 기반 운영을 이어갈 수 있게 됨" rows={3}/>
        </F>
      </Grid2>
      <F label="이 경험에서 증명된 역량 키워드 3개" req>
        <TI val={exp.skills} set={v=>u(path+".skills",v)} ph="예: 데이터 기반 의사결정, AI 워크플로우 설계, 팀 단위 KPI 운영"/>
      </F>
    </>
  );
}

function S5({d,u,m}) {
  const Row = ({label,val,onN,onE}) => (
    <div style={{border:"1px solid "+C.border,borderRadius:10,padding:16,marginBottom:12}}>
      <div style={{color:C.accent,fontWeight:800,fontSize:10,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:10}}>{label}</div>
      <F label="강점 한 줄" req hint="명사형으로"><TI val={val.name} set={onN} ph="예: 데이터 기반 의사결정 능력"/></F>
      <F label="이 강점을 증명하는 에피소드" req hint="2~3문장으로">
        <TA val={val.evidence} set={onE} ph="예: 동아리 콘텐츠 기획 때 GA 데이터로 분석해, 효율 낮은 4개 카테고리를 정리하고 도달율을 6개월간 380% 끌어올렸습니다." rows={3}/>
      </F>
    </div>
  );
  return (
    <>

/* ── Profile formatter ──────────────────── */
function fmtProfile(d) {
  var L = [];
  L.push("■ 기본 정보");
  L.push("- 이름: " + (d.name||"(미입력)"));
  if(d.age) L.push("- 나이: " + d.age);
  L.push("- 목표 산업: " + (d.targetIndustry||"(미입력)"));
  L.push("- 목표 직무: " + (d.targetRole||"(미입력)"));
  if(d.oneWord) L.push("- 한 단어 정체성: " + d.oneWord);
  if(d.oneWordReason) L.push("- 그 이유: " + d.oneWordReason);
  L.push("");
  L.push("■ 학력 · 자격 · 툴");
  if(d.education) L.push("- 학력: " + d.education);
  if(d.major) L.push("- 전공: " + d.major);
  if(d.gradYear) L.push("- 졸업: " + d.gradYear);
  if(d.gpa) L.push("- 학점: " + d.gpa);
  if(d.majorKeywords) L.push("- 전공 키워드: " + d.majorKeywords);
  if(d.certifications) L.push("- 자격증/수상/어학: " + d.certifications);
  if(d.aiTools) L.push("- AI 툴 활용: " + d.aiTools);
  if(d.otherTools) L.push("- 기타 툴: " + d.otherTools);
  if(d.languages) L.push("- 외국어: " + d.languages);
  [d.exp1, d.exp2].forEach(function(e, i) {
    if(!e || (!e.title && !e.action)) return;
    L.push(""); L.push("■ 핵심 경험 " + (i+1));
    if(e.title) L.push("- 경험명: " + e.title);
    if(e.period) L.push("- 기간: " + e.period);
    if(e.role) L.push("- 역할: " + e.role);
    if(e.situation) L.push("- [S] 상황: " + e.situation);
    if(e.task) L.push("- [T] 과제: " + e.task);
    if(e.action) L.push("- [A] 행동: " + e.action);
    var m = [e.metricPeople, e.metricCount, e.metricImpact].filter(Boolean);
    if(m.length) L.push("- 정량 지표: " + m.join(" / "));
    if(e.resultQuant) L.push("- [R] 정량 성과: " + e.resultQuant);
    if(e.resultQual) L.push("- [R] 정성 성과: " + e.resultQual);
    if(e.skills) L.push("- 역량 키워드: " + e.skills);
  });
  L.push(""); L.push("■ 강점 Top 3");
  [d.strength1, d.strength2, d.strength3].forEach(function(s, i) {
    if(!s.name) return;
    L.push("- 강점 " + (i+1) + ": " + s.name);
    if(s.evidence) L.push("  · 증명: " + s.evidence);
  });
  L.push(""); L.push("■ 가치관 · 차별화");
  if(d.workStyle) L.push("- 일하는 방식: " + d.workStyle);
  if(d.vision) L.push("- 비전: " + d.vision);
  if(d.differentiator) L.push("- 차별화: " + d.differentiator);
  if(d.motivation) L.push("- 지원 동기: " + d.motivation);
  return L.join("\n");
}

/* ── Completion ─────────────────────────── */
function completion(d) {
  var checks = [
    ["이름", !!d.name], ["목표 산업", !!d.targetIndustry], ["목표 직무", !!d.targetRole],
    ["한 단어 정체성", !!d.oneWord], ["AI 툴 경험", !!d.aiTools],
    ["경험1 행동", !!d.exp1.action], ["경험1 결과", !!d.exp1.resultQuant],
    ["강점1", !!(d.strength1.name && d.strength1.evidence)],
    ["강점2", !!(d.strength2.name && d.strength2.evidence)],
    ["강점3", !!(d.strength3.name && d.strength3.evidence)],
    ["일하는 방식", !!d.workStyle], ["비전", !!d.vision],
    ["차별화", !!d.differentiator], ["지원 동기", !!d.motivation],
  ];
  var filled = checks.filter(function(c){return c[1];}).length;
  var missing = checks.filter(function(c){return !c[1];}).map(function(c){return c[0];});
  return {pct: Math.round(filled/checks.length*100), missing: missing};
}

/* ── Prompt Card ─────────────────────────── */

          <div style={{color:C.muted,fontWeight:700,fontSize:10,textTransform:"uppercase",letterSpacing:"0.15em",marginBottom:3}}>프롬프트 {num}</div>
          <div style={{fontWeight:800,fontSize:14,color:C.ink,marginBottom:4,lineHeight:1.3}}>{title}</div>
          <div style={{color:C.muted,fontSize:12,lineHeight:1.6}}>{usage}</div>
        </div>
        <button onClick={onCopy} style={{
          background:done?"#0A7A3B":C.ink,color:"#fff",border:"none",borderRadius:8,
          padding:"8px 12px",fontSize:12,fontWeight:700,cursor:"pointer",
          display:"flex",alignItems:"center",gap:5,flexShrink:0,whiteSpace:"nowrap"
        }}>
          {done ? "✓ 복사됨" : "📋 복사"}
        </button>
      </div>
      <div style={{background:C.canvas,padding:16}}>
        <pre style={{fontSize:11,lineHeight:1.8,whiteSpace:"pre-wrap",wordBreak:"break-word",maxHeight:220,overflowY:"auto",margin:0,color:C.ink,fontFamily:"'SF Mono',ui-monospace,Menlo,monospace"}}>{content}</pre>
      </div>
      {tip && (
        <div style={{borderTop:"1px solid "+C.borderSoft,background:C.canvas,padding:"8px 16px",display:"flex",alignItems:"flex-start",gap:6}}>
          <span style={{flexShrink:0,fontSize:12}}>💡</span>
          <p style={{color:C.muted,fontSize:11,margin:0,lineHeight:1.6}}>{tip}</p>
        </div>
      )}
    </div>
  );
}

          <span style={{color:"#2997FF",fontSize:18,flexShrink:0,marginTop:2}}>✨</span>
          <div>
            <div style={{fontWeight:800,fontSize:14,color:"#fff",marginBottom:8}}>강사 활용 팁</div>
            <ul style={{color:"rgba(255,255,255,0.78)",fontSize:12,lineHeight:1.9,paddingLeft:18,margin:0}}>
              <li>입력 단계 자체가 자기탐색 수업의 핵심입니다. <strong style={{color:"#fff"}}>STEP 3~4 (경험)</strong>에만 최소 30분을 쓰게 하세요.</li>
              <li>프롬프트 결과를 받은 뒤 "200자로 줄여줘", "이 회사 JD에 맞게 다시 써줘" 같은 후속 프롬프트 사용법을 함께 가르치세요.</li>
              <li>우상단 <strong style={{color:"#fff"}}>내보내기</strong>로 JSON을 받아 다음 기수 강의 때 불러올 수 있습니다.</li>
              <li>학생끼리 서로의 한 줄 소개를 평가하는 페어 리뷰 시간을 가지면 효과가 배가됩니다.</li>
            </ul>
          </div>
        </div>
      </div>
    </>
  );
}

/* ── Main App ────────────────────────────── */
function App() {
  var _s = useState(1); var step = _s[0]; var setStep = _s[1];
  var _d = useState(INIT); var data = _d[0]; var setData = _d[1];
  var _c = useState(null); var copied = _c[0]; var setCopied = _c[1];
  var isMobile = useIsMobile();

  var upd = useCallback(function(path, val) {
    setData(function(prev){ return setIn(prev, path, val); });
  }, []);

  function exportData() {
    var blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href=url; a.download="branding-"+(data.name||"draft")+"-"+new Date().toISOString().slice(0,10)+".json";
    a.click(); URL.revokeObjectURL(url);
  }

  function importData(e) {
    var file = e.target.files && e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try { setData(Object.assign({},INIT,JSON.parse(ev.target.result))); }
      catch(err) { alert("파일을 읽을 수 없습니다."); }
    };
    reader.readAsText(file);
    e.target.value="";
  }

  function copyPrompt(text, id) {
    navigator.clipboard.writeText(text);
    setCopied(id);
    setTimeout(function(){setCopied(null);},1800);
  }

  var pct = step/STEPS.length*100;

  /* ── Desktop Sidebar ─────────────────────── */
  var Sidebar = (
    <aside style={{position:"sticky",top:70,height:"fit-content",width:200,flexShrink:0}}>
      <div style={{color:C.muted,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>진행 단계 {step}/{STEPS.length}</div>
      <ol style={{listStyle:"none",margin:0,padding:0}}>
        {STEPS.map(function(s){
          var active = s.id===step;
          var done = s.id<step;
          return (
            <li key={s.id} style={{marginBottom:3}}>
              <button onClick={function(){setStep(s.id);}}
                style={{width:"100%",textAlign:"left",border:"none",borderRadius:9,padding:"8px 10px",display:"flex",alignItems:"flex-start",gap:9,cursor:"pointer",
                  background:active?C.ink:"transparent",color:active?"#fff":done?C.ink:C.muted}}>
                <div style={{width:22,height:22,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,flexShrink:0,marginTop:1,
                  background:active?"#fff":done?C.accent:C.borderSoft,color:active?C.ink:done?"#fff":C.muted}}>
                  {done?"✓":s.id}
                </div>
                <div>
                  <div style={{fontWeight:600,fontSize:12,lineHeight:1.3}}>{s.label}</div>
                  <div style={{fontSize:10,opacity:0.6,marginTop:2,lineHeight:1.3}}>{s.sub}</div>
                </div>
              </button>
            </li>
          );
        })}
      </ol>
    </aside>
  );

  /* ── Mobile Step Bar ─────────────────────── */
  var MobileStepBar = (
    <div style={{background:C.panel,borderBottom:"1px solid "+C.border,padding:"10px 0 0"}}>
      <div className="step-scroll" style={{padding:"0 16px 10px",display:"flex",gap:7}}>
        {STEPS.map(function(s){
          var active = s.id===step;
          var done = s.id<step;
          return (
            <button key={s.id} onClick={function(){setStep(s.id);}}
              style={{flexShrink:0,display:"flex",alignItems:"center",gap:5,
                border:"none",borderRadius:20,padding:"5px 12px",cursor:"pointer",
                background:active?C.ink:done?C.accentBg:C.borderSoft,
                color:active?"#fff":done?C.accent:C.muted,
                fontSize:11,fontWeight:700,whiteSpace:"nowrap",
                boxShadow:active?"0 2px 8px rgba(0,0,0,0.15)":"none"
              }}>
              <span style={{
                width:18,height:18,borderRadius:"50%",
                background:active?"rgba(255,255,255,0.2)":done?C.accent:"rgba(0,0,0,0.08)",
                color:active?"#fff":done?"#fff":C.muted,
                display:"inline-flex",alignItems:"center",justifyContent:"center",
                fontSize:9,fontWeight:900,flexShrink:0,
              }}>{done?"✓":s.id}</span>
              {s.label}
            </button>
          );
        })}
      </div>
      <div style={{height:3,background:C.borderSoft}}>
        <div style={{width:pct+"%",height:"100%",background:C.accent,transition:"width 0.4s ease"}}/>
      </div>
    </div>
  );

  return (
    <div style={{background:C.canvas,minHeight:"100vh",color:C.ink}}>

      {/* ── Header ─────────────────────────────── */}
      <header style={{borderBottom:"1px solid "+C.border,background:C.panel,position:"sticky",top:0,zIndex:50}}>
        <div style={{maxWidth:1100,margin:"0 auto",padding:isMobile?"11px 16px":"13px 22px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{background:C.ink,width:34,height:34,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>✨</div>
            <div>
              <div style={{fontWeight:800,fontSize:isMobile?13:14,letterSpacing:"-0.02em",lineHeight:1.2}}>퍼스널 브랜딩 프로필 빌더</div>
              {!isMobile && <div style={{color:C.muted,fontSize:11,marginTop:1}}>AI 활용 취업 브랜딩 · 입력 → 프롬프트 자동 생성</div>}
            </div>
          </div>
          <div style={{display:"flex",gap:7,alignItems:"center"}}>
            <label style={{
              display:"flex",alignItems:"center",gap:5,
              border:"1px solid "+C.border,background:C.canvas,color:C.muted,
              borderRadius:8,padding:"7px 12px",fontSize:12,fontWeight:600,cursor:"pointer"
            }}>
              📂 {!isMobile && "불러오기"}
              <input type="file" accept=".json" onChange={importData} style={{display:"none"}}/>
            </label>
            <button onClick={exportData} style={{
              display:"flex",alignItems:"center",gap:5,
              border:"none",background:C.ink,color:"#fff",
              borderRadius:8,padding:"7px 12px",fontSize:12,fontWeight:700,cursor:"pointer"
            }}>
              💾 {!isMobile && "내보내기"}
            </button>
          </div>
        </div>
        {/* Mobile: progress bar built into step bar below / Desktop: thin bar */}
        {!isMobile && (
          <div style={{height:3,background:C.borderSoft}}>
            <div style={{width:pct+"%",height:"100%",background:C.accent,transition:"width 0.4s ease"}}/>
          </div>
        )}
      </header>

      {/* ── Mobile Step Bar ─────────────────────── */}
      {isMobile && MobileStepBar}

      {/* ── Body ────────────────────────────────── */}
      <div style={{
        maxWidth:1100,margin:"0 auto",
        padding:isMobile?"16px 12px":"26px 22px",
        display:isMobile?"block":"flex",
        gap:24,
        alignItems:"flex-start",
      }}>

        {/* Desktop sidebar */}
        {!isMobile && Sidebar}

        {/* Main content */}
        <main style={{flex:1,minWidth:0}}>
          <div style={{background:C.panel,border:"1px solid "+C.border,borderRadius:isMobile?14:18,padding:isMobile?"20px 16px":36}}>

            {step===1 && <S1 d={data} u={upd} m={isMobile}/>}
            {step===2 && <S2 d={data} u={upd} m={isMobile}/>}
            {step===3 && (
              <SE
                title="핵심 경험 #1"
                sub="가장 임팩트 있었던 경험을 STAR 프레임으로 분해합니다."
                stepLabel="STEP 03" optional={false}
                num={1} exp={data.exp1} path="exp1" u={upd} m={isMobile}
              />
            )}
            {step===4 && (
              <SE
                title="핵심 경험 #2"
                sub="첫 번째와 결이 다른 경험을 골라주세요. (예: 1번이 학업이면 2번은 활동/알바)"
                stepLabel="STEP 04" optional={true}
                num={2} exp={data.exp2} path="exp2" u={upd} m={isMobile}
              />
            )}
            {step===5 && <S5 d={data} u={upd} m={isMobile}/>}
            {step===6 && <S6 d={data} u={upd} m={isMobile}/>}
            {step===7 && <S8 d={data} copied={copied} onCopy={copyPrompt}/>}

            {/* Navigation */}
            <div style={{borderTop:"1px solid "+C.border,marginTop:28,paddingTop:16,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <button onClick={function(){setStep(function(s){return Math.max(1,s-1);});}} disabled={step===1}
                style={{border:"1px solid "+C.border,background:"transparent",color:step===1?C.faint:C.ink,borderRadius:8,padding:isMobile?"10px 16px":"9px 18px",fontSize:13,fontWeight:600,cursor:step===1?"not-allowed":"pointer"}}>
                ← 이전
              </button>
              <span style={{color:C.faint,fontSize:12}}>Step {step} / {STEPS.length}</span>
              {step<STEPS.length
                ? <button onClick={function(){setStep(function(s){return Math.min(STEPS.length,s+1);});}}
                    style={{background:C.ink,color:"#fff",border:"none",borderRadius:8,padding:isMobile?"10px 16px":"9px 18px",fontSize:13,fontWeight:700,cursor:"pointer"}}>
                    다음 →
                  </button>
                : <button onClick={function(){setStep(1);}}
                    style={{border:"1px solid "+C.border,background:"transparent",color:C.ink,borderRadius:8,padding:isMobile?"10px 16px":"9px 18px",fontSize:13,fontWeight:600,cursor:"pointer"}}>
                    처음으로
                  </button>
              }
            </div>
          </div>
          <p style={{color:C.faint,fontSize:11,marginTop:10,padding:"0 4px",lineHeight:1.6}}>
            💡 입력 내용은 브라우저를 닫으면 사라집니다. 우상단 <strong>내보내기</strong>로 JSON을 저장해두세요.
          </p>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
